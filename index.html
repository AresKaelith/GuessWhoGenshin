<!DOCTYPE html>
<html>

<head>

<title>Genshin Guess Who</title>


<style>

/* CSS GOES HERE */

body {
    background: #ffd6e5;
    font-family: Arial;
    text-align: center;
}


#grid {
    display:grid;
    grid-template-columns: repeat(15, 1fr);
    gap:10px;
    padding:20px;
}

.card {
    background:white;
    border-radius:15px;
    padding:5px;
    cursor:pointer;
}

.image-container {
    position: relative;
}


.card img {
    width:80px;
    height:80px;
    border-radius:50%;
}


.card p {

    font-size:15px;

    margin:8px 0 3px;

    font-weight:bold;

}

.cross {

    display:none;

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    justify-content:center;
    align-items:center;

}


.cross img {

    width:75%;
    height:75%;

    object-fit:contain;

}


.eliminated .cross {

    display:flex;

}

.cross img {

    width:90%;
    height:90%;

    object-fit:contain;

}

.eliminated .cross {
    display:block;
}


.switch {
    position:relative;
    display:inline-block;
    width:60px;
    height:34px;
}


.switch input {
    opacity:0;
    width:0;
    height:0;
}


.slider {

    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;

    background:#ccc;
    border-radius:34px;

    transition:0.3s;

}


.slider:before {

    content:"";

    position:absolute;

    height:26px;
    width:26px;

    left:4px;
    bottom:4px;

    background:white;

    border-radius:50%;

    transition:0.3s;

}


input:checked + .slider {

    background:#ff7fa8;

}


input:checked + .slider:before {

    transform:translateX(26px);

}


.controls {

    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;

    margin:20px;

}


.controls div {

    display:flex;
    align-items:center;
    gap:10px;

}


#resetButton {

    padding:10px 20px;

    border:none;
    border-radius:20px;

    background:#ff7fa8;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

}


#resetButton:hover {

    background:#ff5f91;

}

</style>

</head>
